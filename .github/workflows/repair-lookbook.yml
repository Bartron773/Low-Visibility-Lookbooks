name: Repair lookbook metadata

on:
  push:
    paths:
      - '.github/workflows/repair-lookbook.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repair index metadata and generate social preview
        shell: python
        run: |
          from pathlib import Path
          import re, struct, zlib

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')

          title = 'LOW VISIBILITY™ — SS27 Lookbook Collection'
          description = ('LOW VISIBILITY™ SS27 Lookbook Collection by Simple Minds Studios. '
                         'Three books exploring minimalism, architecture, and cinematic fashion storytelling.')
          canonical = 'https://bartron773.github.io/Low-Visibility-Lookbooks/'
          image_url = canonical + 'social-preview.png'

          html = re.sub(r'<title>.*?</title>', f'<title>{title}</title>', html, count=1, flags=re.S)

          patterns = [
              r'\s*<meta\s+name="description"[^>]*>',
              r'\s*<meta\s+name="author"[^>]*>',
              r'\s*<meta\s+name="theme-color"[^>]*>',
              r'\s*<meta\s+name="color-scheme"[^>]*>',
              r'\s*<meta\s+name="format-detection"[^>]*>',
              r'\s*<meta\s+property="og:[^"]+"[^>]*>',
              r'\s*<meta\s+name="twitter:[^"]+"[^>]*>',
              r'\s*<link\s+rel="canonical"[^>]*>',
          ]
          for pattern in patterns:
              html = re.sub(pattern, '', html, flags=re.I)

          metadata_lines = [
              f'<meta name="description" content="{description}">',
              '<meta name="author" content="Simple Minds Studios">',
              '<meta name="theme-color" content="#0a0a0a">',
              '<meta name="color-scheme" content="dark">',
              '<meta name="format-detection" content="telephone=no">',
              f'<link rel="canonical" href="{canonical}">',
              '',
              '<meta property="og:type" content="website">',
              '<meta property="og:site_name" content="LOW VISIBILITY™">',
              f'<meta property="og:title" content="{title}">',
              f'<meta property="og:description" content="{description}">',
              f'<meta property="og:url" content="{canonical}">',
              f'<meta property="og:image" content="{image_url}">',
              '<meta property="og:image:width" content="1200">',
              '<meta property="og:image:height" content="630">',
              '<meta property="og:image:alt" content="LOW VISIBILITY SS27 Lookbook Collection">',
              '',
              '<meta name="twitter:card" content="summary_large_image">',
              f'<meta name="twitter:title" content="{title}">',
              f'<meta name="twitter:description" content="{description}">',
              f'<meta name="twitter:image" content="{image_url}">',
          ]
          metadata = '\n  ' + '\n  '.join(metadata_lines) + '\n'

          viewport_match = re.search(r'(<meta\s+name="viewport"[^>]*>)', html, flags=re.I)
          if not viewport_match:
              raise SystemExit('Viewport meta tag not found; refusing unsafe edit.')

          html = html[:viewport_match.end()] + metadata + html[viewport_match.end():]
          index.write_text(html, encoding='utf-8')

          width, height = 1200, 630
          rows = []
          for y in range(height):
              row = bytearray([0])
              for x in range(width):
                  glow = max(0, 90 - abs(y - 430) // 2)
                  diagonal = max(0, 50 - abs((x - y) - 260) // 8)
                  r = min(255, 10 + glow * 2 + diagonal)
                  g = min(255, 10 + diagonal // 8)
                  b = min(255, 10 + glow * 2 + diagonal)
                  if 414 <= y <= 420:
                      r, g, b = 255, 0, 255
                  row.extend((r, g, b))
              rows.append(bytes(row))
          raw = b''.join(rows)

          def chunk(kind, data):
              return (struct.pack('>I', len(data)) + kind + data +
                      struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff))

          png = (b'\x89PNG\r\n\x1a\n' +
                 chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)) +
                 chunk(b'IDAT', zlib.compress(raw, 9)) +
                 chunk(b'IEND', b''))
          Path('social-preview.png').write_bytes(png)

      - name: Commit repaired files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html social-preview.png
          git diff --cached --quiet && exit 0
          git commit -m "Repair metadata and add social sharing preview"
          git push